name: Smoke + Metrics (Manual)

on:
  workflow_dispatch:
    inputs:
      dash_loop_iters:
        description: "Opsional: jumlah iterasi Dash callback loop (0 = off)."
        required: false
        default: "0"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ecoaims_frontend/requirements.txt
            ecoaims_frontend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ecoaims_frontend/requirements.txt
          if [ -f ecoaims_frontend/requirements-dev.txt ]; then python -m pip install -r ecoaims_frontend/requirements-dev.txt; fi

      - name: Smoke (stack) + verify /metrics changes
        env:
          ECOAIMS_SMOKE_VERIFY_METRICS: "true"
          ECOAIMS_SMOKE_DASH_LOOP_ITERS: ${{ github.event.inputs.dash_loop_iters }}
          ECOAIMS_OPTIMIZATION_CACHE_TTL_S: "1.0"
        run: |
          make smoke

      - name: Upload logs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            .run/*.log
            output/patch_validation/*.json
          if-no-files-found: ignore

name: Load Testing (Manual)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL backend (staging), contoh: https://staging.example.com atau http://127.0.0.1:8008"
        required: true
        type: string
      concurrency:
        description: "Jumlah worker concurrency"
        required: false
        default: "50"
        type: string
      total_requests:
        description: "Total requests"
        required: false
        default: "2000"
        type: string
      ramp_up_s:
        description: "Ramp-up time (seconds)"
        required: false
        default: "20"
        type: string
      timeout_s:
        description: "HTTP timeout per request (seconds)"
        required: false
        default: "5"
        type: string
      p95_threshold_ms:
        description: "Fail jika p95 latency > threshold (ms). 0 = disable"
        required: false
        default: "1200"
        type: string
      ratio_429_max:
        description: "Fail jika ratio 429 > max"
        required: false
        default: "0.20"
        type: string
      ratio_err_max:
        description: "Fail jika ratio error (>=400 selain 429) > max"
        required: false
        default: "0.05"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.base_url }}
  cancel-in-progress: true

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ecoaims_frontend/requirements.txt
            ecoaims_frontend/requirements-dev.txt

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ecoaims_frontend/requirements.txt

      - name: Run load test (HTTP)
        env:
          ECOAIMS_LOAD_BASE_URL: ${{ github.event.inputs.base_url }}
          ECOAIMS_LOAD_CONCURRENCY: ${{ github.event.inputs.concurrency }}
          ECOAIMS_LOAD_TOTAL_REQUESTS: ${{ github.event.inputs.total_requests }}
          ECOAIMS_LOAD_RAMP_UP_S: ${{ github.event.inputs.ramp_up_s }}
          ECOAIMS_LOAD_TIMEOUT_S: ${{ github.event.inputs.timeout_s }}
          ECOAIMS_LOAD_P95_THRESHOLD_MS: ${{ github.event.inputs.p95_threshold_ms }}
          ECOAIMS_LOAD_429_RATIO_MAX: ${{ github.event.inputs.ratio_429_max }}
          ECOAIMS_LOAD_ERROR_RATIO_MAX: ${{ github.event.inputs.ratio_err_max }}
          ECOAIMS_LOAD_EMIT_JSON: "true"
        run: |
          python scripts/load_test_http.py | tee load_test_output.txt

      - name: Upload load test output
        uses: actions/upload-artifact@v4
        with:
          name: load-test-output
          path: load_test_output.txt

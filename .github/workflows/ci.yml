name: ECO-AIMS FE CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            ecoaims_frontend/requirements.txt
            ecoaims_frontend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ecoaims_frontend/requirements.txt
          if [ -f ecoaims_frontend/requirements-dev.txt ]; then python -m pip install -r ecoaims_frontend/requirements-dev.txt; fi

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      - name: Callback audit
        run: make audit-callbacks

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ecoaims_frontend/requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Dependency vulnerability audit (non-blocking)
        run: |
          pip-audit -r ecoaims_frontend/requirements.txt
